name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          cargo_version=$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          if [ "$cargo_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag version (${{ steps.version.outputs.version }}) does not match Cargo.toml version ($cargo_version)" >&2
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release exe
        run: cargo build --release

      - name: Install NSIS
        run: choco install nsis -y
        shell: pwsh

      - name: Build NSIS installer
        run: makensis /DVERSION=${{ steps.version.outputs.version }} installer\trouble.nsi
        shell: cmd

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            TroubleSetup-*.exe
            target/release/trouble.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TroubleSetup-*.exe
            dist/trouble.exe
          generate_release_notes: true
